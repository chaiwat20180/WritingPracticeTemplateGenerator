<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Practice Template Generator - Ultimate Pro</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&family=Noto+Sans+KR:wght@400;600&family=Noto+Sans+SC:wght@400;600&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <div style="margin-top: 15px; color: white; font-weight: bold; font-size: 18px;" id="loadingText" data-i18n="loadingText">กำลังประมวลผล...</div>
</div>

<div class="toast" id="copyToast">✅ คัดลอกสำเร็จ!</div>

<div class="mobile-header">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <h2>🛠 WPTG</h2>
    <div class="header-right">
        <button class="donate-btn" onclick="openDonateModal()">💖</button>
        <div class="lang-switch">
            <div class="lang-option active" id="btn-th-mob" onclick="setLanguage('th')">TH</div>
            <div class="lang-option" id="btn-en-mob" onclick="setLanguage('en')">EN</div>
        </div>
    </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="zoom-controls">
    <button class="zoom-btn" onclick="changeZoom(0.1)" title="Zoom In">➕</button>
    <button class="zoom-btn" onclick="resetZoom()" title="Reset Zoom" style="font-size: 16px;">🔄</button>
    <button class="zoom-btn" onclick="changeZoom(-0.1)" title="Zoom Out">➖</button>
</div>

<div class="sidebar" id="sidebar">
    <button class="close-sidebar-btn" onclick="toggleSidebar()">✖</button>
    
    <div class="header-box">
        <h2>🛠 WPTG</h2>
        <div class="header-right">
            <button class="donate-btn" onclick="openDonateModal()">💖 <span data-i18n="btnDonate">Donate</span></button>
            <div class="lang-switch">
                <div class="lang-option active" id="btn-th-desk" onclick="setLanguage('th')">TH</div>
                <div class="lang-option" id="btn-en-desk" onclick="setLanguage('en')">EN</div>
            </div>
        </div>
    </div>

    <hr class="sidebar-divider">

    <div class="sidebar-section collapsed">
        <h4 class="sidebar-section-title" data-i18n="secHeader">📝 ข้อมูลหัวกระดาษ</h4>
        <input type="text" id="headerTitle" class="control" placeholder="ชื่อหัวข้อใบงาน (ปล่อยว่างได้)" data-i18n-ph="phHeaderTitle">
        <div class="row-flex">
            <input type="text" id="headerName" class="control" placeholder="ชื่อ-สกุล" data-i18n-ph="phHeaderName">
            <input type="text" id="headerClass" class="control" placeholder="ชั้น/เลขที่" style="width: 40%;" data-i18n-ph="phHeaderClass">
        </div>
    </div>

    <div class="sidebar-section collapsed">
        <h4 class="sidebar-section-title" data-i18n="secText">✍️ ข้อความและคำอ่าน</h4>
        
        <div class="group">
            <label data-i18n="presetLabel">ชุดตัวอักษร</label>
            <select id="preset" class="select-ui">
                <option value="custom" data-search="custom กำหนดเอง" data-i18n-opt="optCustom">-- กำหนดเอง / Custom --</option>
                
                <optgroup label="ภาษาไทย (Thai)" data-i18n-grp="grpThai">
                    <option value="thai" data-search="thai th ไทย กขค พยัญชนะ" data-i18n-opt="optThCon">🇹🇭 พยัญชนะ (ก-ฮ)</option>
                    <option value="thai_vowel" data-search="thai th ไทย สระ" data-i18n-opt="optThVow">🇹🇭 สระไทย (32 เสียง)</option>
                </optgroup>

                <optgroup label="ภาษาญี่ปุ่น (Japanese)" data-i18n-grp="grpJp">
                    <option value="hira" data-search="japan jp hira ฮิรางานะ ญี่ปุ่น พื้นฐาน" data-i18n-opt="optJpHira">🇯🇵 ฮิรางานะ พื้นฐาน (あ-ん)</option>
                    <option value="hira_daku" data-search="japan jp hira daku ฮิรางานะ ขุ่น เต็นเต็น มารุ" data-i18n-opt="optJpHiraDaku">🇯🇵 ฮิรางานะ เสียงขุ่น (が-ぽ)</option>
                    <option value="hira_yoon" data-search="japan jp hira yoon sokuon ฮิรางานะ ควบกล้ำ" data-i18n-opt="optJpHiraYoon">🇯🇵 ฮิรางานะ ควบกล้ำ/หยุด (きゃ-っ)</option>
                    <option value="kata" data-search="japan jp kata คาตาคานะ ญี่ปุ่น พื้นฐาน" data-i18n-opt="optJpKata">🇯🇵 คาตาคานะ พื้นฐาน (ア-ン)</option>
                    <option value="kata_daku" data-search="japan jp kata daku คาตาคานะ ขุ่น เต็นเต็น มารุ" data-i18n-opt="optJpKataDaku">🇯🇵 คาตาคานะ เสียงขุ่น (ガ-ポ)</option>
                    <option value="kata_yoon" data-search="japan jp kata yoon sokuon คาตาคานะ ควบกล้ำ" data-i18n-opt="optJpKataYoon">🇯🇵 คาตาคานะ ควบกล้ำ/หยุด (キャ-ッ)</option>
                </optgroup>
                
                <optgroup label="ภาษาญี่ปุ่น - หมวดหมู่เพิ่มเติม" data-i18n-grp="grpJpExtra">
                    <option value="jp_family" data-i18n-opt="optJpFam">🇯🇵 ครอบครัว (Family)</option>
                    <option value="jp_numbers" data-i18n-opt="optJpNum">🇯🇵 ตัวเลขญี่ปุ่น (Numbers)</option>
                    <option value="jp_months" data-i18n-opt="optJpMon">🇯🇵 เดือน (Months)</option>
                    <option value="jp_directions" data-i18n-opt="optJpDir">🇯🇵 ทิศทาง (Directions)</option>
                </optgroup>

                <optgroup label="ภาษาญี่ปุ่น - JLPT (ชุดที่ 1)" data-i18n-grp="grpJpJLPT">
                    <option value="jp_n5" data-i18n-opt="optJpN5">🇯🇵 JLPT N5 (คันจิพื้นฐาน)</option>
                    <option value="jp_n4" data-i18n-opt="optJpN4">🇯🇵 JLPT N4</option>
                    <option value="jp_n3" data-i18n-opt="optJpN3">🇯🇵 JLPT N3</option>
                    <option value="jp_n2" data-i18n-opt="optJpN2">🇯🇵 JLPT N2</option>
                    <option value="jp_n1" data-i18n-opt="optJpN1">🇯🇵 JLPT N1</option>
                </optgroup>
                
                <optgroup label="ภาษาญี่ปุ่น - JLPT (ชุดที่ 2)" data-i18n-grp="grpJpJLPT2">
                    <option value="jp_n5_2" data-i18n-opt="optJpN5_2">🇯🇵 JLPT N5 (คำศัพท์พื้นฐาน)</option>
                    <option value="jp_n4_2" data-i18n-opt="optJpN4_2">🇯🇵 JLPT N4 (ชุด 2)</option>
                    <option value="jp_n3_2" data-i18n-opt="optJpN3_2">🇯🇵 JLPT N3 (ชุด 2)</option>
                    <option value="jp_n2_2" data-i18n-opt="optJpN2_2">🇯🇵 JLPT N2 (ชุด 2)</option>
                    <option value="jp_n1_2" data-i18n-opt="optJpN1_2">🇯🇵 JLPT N1 (ชุด 2)</option>
                </optgroup>

                <optgroup label="ตัวเลข (Numbers)" data-i18n-grp="grpNum">
                    <option value="num_arab" data-i18n-opt="optNumArab">🔢 เลขอารบิก (0-9)</option>
                    <option value="num_thai" data-i18n-opt="optNumThai">🔢 เลขไทย (๐-๙)</option>
                </optgroup>
                
                <optgroup label="สากล (Global)" data-i18n-grp="grpGlobal">
                    <option value="abc" data-search="english eng upper อังกฤษ พิมพ์ใหญ่" data-i18n-opt="optEnUp">🇬🇧 English Upper (A-Z)</option>
                    <option value="abc_low" data-search="english eng lower อังกฤษ พิมพ์เล็ก" data-i18n-opt="optEnLow">🇬🇧 English Lower (a-z)</option>
                    <option value="kor" data-search="korea kr hangul ฮันกึล เกาหลี" data-i18n-opt="optKor">🇰🇷 Korean Hangul</option>
                    <option value="rus" data-search="russia cyrillic รัสเซีย" data-i18n-opt="optRus">🇷🇺 Russian Cyrillic</option>
                    <option value="gre" data-search="greece greek กรีก" data-i18n-opt="optGre">🇬🇷 Greek (Alpha-Omega)</option>
                    <option value="spa" data-search="spain spanish สเปน" data-i18n-opt="optSpa">🇪🇸 Spanish (Alfabeto)</option>
                    <option value="ger" data-search="german germany เยอรมัน" data-i18n-opt="optGer">🇩🇪 German (Alphabet)</option>
                </optgroup>
            </select>
        </div>

        <div class="row-flex" style="margin-top: 5px; gap: 5px;">
            <button class="btn-preset-save" onclick="openSavePresetModal()" data-i18n="btnSavePreset">💾 บันทึก Preset </button>
            <button class="btn-preset-delete" id="btnDeletePreset" onclick="deleteCustomPreset()" style="display: none;" data-i18n="btnDeletePreset">🗑️ ลบ</button>
        </div>

        <div class="row-flex" style="margin-top: 5px; margin-bottom: 10px;">
            <button class="btn-preset-action btn-preset-export" onclick="exportUserPresets()" data-i18n="btnExportPreset">📤 ส่งออก Preset </button>
            <button class="btn-preset-action btn-preset-import" onclick="triggerImport()" data-i18n="btnImportPreset">📥 นำเข้า Preset </button>
            <input type="file" id="importFile" style="display:none" onchange="importUserPresets(event)" accept=".json">
        </div>
        <div class="group" style="background: #f0fdf4; padding: 10px; border-radius: 8px; border: 1px solid #bbf7d0;">
            <label style="color: #16a34a; font-weight: bold; display: flex; align-items: center; gap: 6px;">
                📝 <span data-i18n="textLabel">ข้อความต้นแบบ (คั่นด้วย ,)</span>
            </label>
            <input type="text" id="textInput" class="control" placeholder="พิมพ์ข้อความที่ต้องการ..." data-i18n-ph="textPh" style="border-color: #86efac; margin-top: 5px;">
        </div>

        <div class="group" style="background: #f0f8ff; padding: 10px; border-radius: 8px; border: 1px solid #b6d4fe;">
            <label style="color: #4a90e2; font-weight: bold;" data-i18n="customReadLabel">💡 คำอ่านกำหนดเอง (คั่นด้วย ,)</label>
            <input type="text" id="customReadingInput" class="control" placeholder="เช่น a,b,c..." data-i18n-ph="customReadPh" style="border-color: #cbd5e1; margin-top: 5px;">
        </div>
        
        <div class="group" style="background: #fff4e6; padding: 10px; border-radius: 8px; border: 1px solid #ffd8a8;">
            <label style="color: #d97706; font-weight: bold;" data-i18n="customMeanLabel">💡 คำแปลกำหนดเอง (คั่นด้วย ,)</label>
            <input type="text" id="customMeaningInput" class="control" placeholder="ใส่คำแปล เช่น นก,หมา,แมว..." data-i18n-ph="customMeanPh" style="border-color: #fcd34d; margin-top: 5px;">
        </div>
    </div>

    <div class="sidebar-section collapsed">
        <h4 class="sidebar-section-title" data-i18n="secLayout">📏 ขนาดและทิศทาง</h4>
        
        <div class="row-flex">
            <div class="group" style="flex:1">
                <label data-i18n="paperSize">ขนาดกระดาษ</label>
                <select id="paperSize" class="select-ui">
                    <option value="a4">A4</option>
                    <option value="b5">B5</option>
                </select>
            </div>
            <div class="group" style="flex:1">
                <label data-i18n="orientation">แนววาง</label>
                <select id="paperOrientation" class="select-ui">
                    <option value="p" data-i18n="port">แนวตั้ง</option>
                    <option value="l" data-i18n="land">แนวนอน</option>
                </select>
            </div>
        </div>

        <div class="row-flex">
            <div class="group" style="flex:1">
                <label data-i18n="colsLabel">จำนวนคอลัมน์</label>
                <input type="number" id="cols" class="control" value="10" min="1">
            </div>
            <div class="group" style="flex:1">
                <label data-i18n="rowsLabel">จำนวนแถว (รวม)</label>
                <input type="number" id="rows" class="control" value="10" min="1">
            </div>
        </div>

        <div class="group">
            <label data-i18n="dirLabel">ทิศทางของข้อมูล</label>
            <select id="direction" class="select-ui">
                <option value="horiz" data-i18n="dirHoriz">แนวนอน (ซ้ายไปขวา)</option>
                <option value="vert" data-i18n="dirVert">แนวตั้ง (บนลงล่าง)</option>
            </select>
        </div>

        <div class="group">
            <label data-i18n="modeLabel">โหมดการแสดงตัวอักษร</label>
            <select id="fillMode" class="select-ui">
                <option value="all" data-i18n="modeAll" selected>แสดงเรียงต่อเนื่อง (ครบทุกตัว)</option>
                <option value="model" data-i18n="modeModel">เฉพาะแถว/คอลัมน์แรก (คัดตาม)</option>
                <option value="repeat" data-i18n="modeRepeat">วนซ้ำข้อความจนเต็มหน้ากระดาษ</option>
            </select>
        </div>

        <div class="group" id="repeatGroupHoriz" style="display:none; background: #f8fafc; padding: 8px; border-radius: 6px;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color: var(--primary);">
                <input type="checkbox" id="repeatRowHoriz"> <b data-i18n="repeatLabelHoriz">ทำซ้ำตัวอักษรให้เต็มแถว</b>
            </label>
        </div>
        <div class="group" id="repeatGroupVert" style="display:none; background: #f8fafc; padding: 8px; border-radius: 6px;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color: var(--primary);">
                <input type="checkbox" id="repeatRowVert"> <b data-i18n="repeatLabelVert">ทำซ้ำตัวอักษรให้เต็มคอลัมน์</b>
            </label>
        </div>
    </div>

    <div class="sidebar-section collapsed">
        <h4 class="sidebar-section-title" data-i18n="secStyle">🎨 รูปแบบและสีสัน</h4>
        <div class="group" style="background: #f8fafc; padding: 10px; border-radius: 8px; margin-top: 5px;">
            <label><span data-i18n="gridWeight">ความหนาเส้นตาราง</span>: <span id="weightVal">1.0</span>px</label>
            <input type="range" id="gridThickness" min="0.5" max="3.0" step="0.1" value="1.0" class="control" style="padding:0; margin-top: 5px;">
        </div>
        <div class="group">
            <label data-i18n="fontLabel">รูปแบบฟอนต์</label>
            <select id="fontSelect" class="select-ui">
                <option value="'Sarabun', sans-serif" data-i18n-opt="optFontSara">Sarabun (ค่าเริ่มต้น)</option>
                <option value="'Klee One', cursive">Klee One (แบบลายมือญี่ปุ่น)</option>
                <option value="'TH SarabunPSK', sans-serif">TH SarabunPSK</option>
                <option value="'TH Sarabun New', sans-serif">TH Sarabun New</option>
                <option value="'Noto Sans JP', sans-serif" data-i18n-opt="optFontJP">Noto Sans JP (ญี่ปุ่น)</option>
                <option value="'Noto Sans KR', sans-serif" data-i18n-opt="optFontKR">Noto Sans KR (เกาหลี)</option>
                <option value="'Noto Sans SC', sans-serif" data-i18n-opt="optFontSC">Noto Sans SC (จีน)</option>
                <option value="Arial, sans-serif" data-i18n-opt="optFontArial">Arial (สากล)</option>
            </select>
        </div>

        <div class="group">
            <label data-i18n="textStyleLabel">รูปแบบตัวอักษรสำหรับคัด</label>
            <select id="textStyle" class="select-ui">
                <option value="light" data-i18n="tsLight">สีเทาอ่อน (Light Grey - ปกติ)</option>
                <option value="dotted" data-i18n="tsDotted">ลายจุด/จำลองเส้นปะ (Dotted)</option>
                <option value="outline" data-i18n="tsOutline">เส้นขอบโปร่ง (Outline)</option>
                <option value="solid" data-i18n="tsSolid">สีดำทึบ (Solid Black)</option>
            </select>
        </div>

        <div class="group" style="background: #f8fafc; padding: 10px; border-radius: 8px;">
            <label><span data-i18n="opacity">ความเข้มรอยประ</span>: <span id="opacityVal">50</span>%</label>
            <input type="range" id="textOpacity" min="10" max="100" value="50" class="control" style="padding:0; margin-top: 5px;">
        </div>

        <div class="group">
            <label data-i18n="layoutLabel">ลักษณะตาราง (Layout)</label>
            <select id="gridLayout" class="select-ui">
                <option value="spaced" data-i18n="laySpace">แยกเป็นช่อง (Spaced)</option>
                <option value="connected" data-i18n="layConn">ตารางติดกัน (Connected)</option>
                <option value="stripes" data-i18n="layStripe">เชื่อมเฉพาะแนวนอน (Striped Rows)</option>
                <option value="stripes-vert" data-i18n="layStripeV">เชื่อมเฉพาะแนวตั้ง (Striped Cols)</option>
            </select>
        </div>

        <div class="row-flex">
            <div class="group" style="flex: 2;">
                <label data-i18n="styleLabel">ลวดลายในช่อง</label>
                <select id="gridStyle" class="select-ui">
                    <option value="square" data-i18n="styleSquare">ช่องว่าง</option>
                    <option value="tian" data-i18n="styleTian">จีน (กากบาท)</option>
                    <option value="tianDotted" data-i18n="styleTianDotted">จีน (กากบาทจุด)</option>
                    <option value="mi" data-i18n="styleMi">จีน (กากบาท+ทแยง)</option>
                    <option value="jiu" data-i18n="styleJiu">จีน (9 ช่อง)</option>
                    <option value="hui" data-i18n="styleHui">จีน (สี่เหลี่ยมซ้อน)</option>
                    <option value="diagonal" data-i18n="styleDiag">ทแยงมุม</option>
                    <option value="cross" data-i18n="styleCross">กากบาทตรง (+)</option>
                    <option value="bottom" data-i18n="styleBottom">เส้นใต้</option>
                    <option value="english" data-i18n="styleEng">อังกฤษ (4 เส้น)</option>
                    <option value="circle" data-i18n="styleCircle">เกาหลี (วงกลม)</option>
                </select>
            </div>
            <div class="group" style="flex: 1;">
                <label data-i18n="colorLabel">สีเส้น</label>
                <input type="color" id="gridColor" value="#94a3b8" class="control" style="height:40px; padding:2px; cursor:pointer;">
            </div>
        </div>
    </div>

    <div class="sidebar-section collapsed">
        <h4 class="sidebar-section-title" data-i18n="secDisplay">👁️ ตัวเลือกการแสดงผล</h4>
        
        <label class="checkbox-label">
            <input type="checkbox" id="altRows"> <span data-i18n="altRow">🔳 โหมดเว้นบรรทัด (สลับแถวว่าง)</span>
        </label>
        
        <label class="checkbox-label">
            <input type="checkbox" id="showRuby" checked> <span data-i18n="pinyinLabel">📖 แสดงช่องคำอ่าน / Pinyin</span>
        </label>

        <label class="checkbox-label">
            <input type="checkbox" id="showMeaning"> <span data-i18n="meaningLabel">📖 แสดงช่องคำแปล (Meaning)</span>
        </label>
        
        <label class="checkbox-label">
            <input type="checkbox" id="autoRead" checked> <span data-i18n="autoReadLabel">✨ เติมคำอ่านอัตโนมัติ (แถบเทา = สระ)</span>
        </label>
    </div>

    <div class="sidebar-actions">
